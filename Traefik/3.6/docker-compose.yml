services:
  traefik:
    image: traefik:v3.6
    container_name: ${CONTAINER_NAME}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - 1panel-network
    ports:
      - "${TRAEFIK_DASHBOARD_BIND:-127.0.0.1}:${PANEL_APP_PORT_HTTP}:8080"
      - "${TRAEFIK_HTTP_PORT}:80"
      - "${TRAEFIK_HTTPS_PORT}:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./data/dynamic:/etc/traefik/dynamic:ro
      - ./data/acme.json:/acme.json
    command:
      - "--configFile=/etc/traefik/traefik.yml"
    labels:
      createdBy: "Apps"
    logging:
      driver: json-file
      options:
        max-size: "200m"
        max-file: "2"

networks:
  1panel-network:
    external: true
