additionalProperties:
    formFields:
        - default: ""
          edit: true
          envKey: NETBIRD_DOMAIN
          labelEn: Public domain (e.g. netbird.example.com, no https://)
          labelZh: 公网域名（如 netbird.example.com，不要带 https://）
          required: true
          rule: paramCommon
          type: text
        - default: 8080
          edit: true
          envKey: PANEL_APP_PORT_HTTP
          labelEn: Dashboard local port (always 127.0.0.1; OpenResty :443, not 「External port access」)
          labelZh: Dashboard 本机端口（固定 127.0.0.1，经 OpenResty :443；勿勾选此外部端口暴露 Dashboard）
          required: true
          rule: paramPort
          type: number
        - default: 8081
          edit: true
          envKey: NETBIRD_MGMT_PORT
          labelEn: Management/API local port (always 127.0.0.1; gRPC via OpenResty)
          labelZh: 管理/API 本机端口（固定 127.0.0.1，gRPC 经 OpenResty 反代）
          required: true
          rule: paramPort
          type: number
        - default: 3478
          edit: true
          envKey: PANEL_APP_PORT_STUN
          labelEn: STUN UDP (HOST_IP + 「External port access」 when not using external Relay)
          labelZh: STUN UDP（未用外部 Relay 时，高级设置勾选「端口外部访问」以放行）
          required: true
          rule: paramPort
          type: number
        - default: ""
          edit: true
          envKey: DATASTORE_ENCRYPTION_KEY
          labelEn: Data store encryption key (base64, auto if empty)
          labelZh: 数据存储加密密钥（base64，留空自动生成）
          required: false
          rule: paramComplexity
          type: password
        - default: ""
          edit: true
          envKey: NETBIRD_RELAY_AUTH_SECRET
          labelEn: Relay auth secret (auto if empty; base64 allowed)
          labelZh: Relay 认证密钥（留空自动生成，支持 base64 含 /+=）
          required: false
          type: text
