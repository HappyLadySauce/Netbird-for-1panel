# NetBird external relay — OpenResty stream TLS passthrough (ssl_preread, OPTIONAL)
# NetBird 外部 Relay — OpenResty stream 层 TLS 透传（可选；custom_cert 默认已由 Docker 暴露公网端口）
#
# Replace RELAY_DOMAIN, RELAY_PUBLIC_PORT, RELAY_LOCAL_PORT from the NetbirdRelay install form.
# 将 RELAY_DOMAIN、RELAY_PUBLIC_PORT、RELAY_LOCAL_PORT 替换为安装表单中的值。
#
# Include from OpenResty main config, e.g. /opt/1panel/openresty/nginx/conf/nginx.conf:
#   stream {
#       include /opt/1panel/www/conf.d/netbird-relay-stream.conf;
#   }
# Or copy this file there after install (see data/openresty-relay-stream.conf on the app instance).

upstream netbird_relay_tls_RELAY_DOMAIN {
    server 127.0.0.1:RELAY_LOCAL_PORT;
}

server {
    listen RELAY_PUBLIC_PORT;
    listen [::]:RELAY_PUBLIC_PORT;
    proxy_pass netbird_relay_tls_RELAY_DOMAIN;
    ssl_preread on;
    proxy_timeout 1d;
}
