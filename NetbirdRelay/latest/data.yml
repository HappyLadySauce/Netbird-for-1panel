additionalProperties:
    formFields:
        - default: ""
          edit: true
          envKey: NETBIRD_RELAY_DOMAIN
          labelEn: Relay public domain (e.g. relay-cn.example.com, no https://)
          labelZh: Relay 公网域名（如 relay-cn.example.com，不要带 https://）
          required: true
          rule: paramCommon
          type: text
        - default: ""
          edit: true
          envKey: NETBIRD_RELAY_AUTH_SECRET
          labelEn: Relay auth secret (same as main NetBird authSecret; base64 allowed)
          labelZh: Relay 认证密钥（与主 NetBird authSecret 一致，支持 base64 含 /+=）
          required: true
          type: text
        - default: custom_cert
          edit: true
          envKey: NETBIRD_RELAY_TLS_MODE
          labelEn: TLS mode (custom_cert | letsencrypt_builtin)
          labelZh: TLS 模式（custom_cert 自填证书 | letsencrypt_builtin 容器申请）
          required: true
          rule: paramCommon
          type: text
        - default: ""
          edit: true
          envKey: NETBIRD_TLS_CERT_FILE
          labelEn: TLS certificate file on host (required for custom_cert; absolute path)
          labelZh: TLS 证书文件路径（custom_cert 必填，宿主机绝对路径）
          required: false
          type: text
        - default: ""
          edit: true
          envKey: NETBIRD_TLS_KEY_FILE
          labelEn: TLS private key file on host (required for custom_cert; absolute path)
          labelZh: TLS 私钥文件路径（custom_cert 必填，宿主机绝对路径）
          required: false
          type: text
        - default: 33080
          edit: true
          envKey: NETBIRD_RELAY_LOCAL_PORT
          labelEn: Relay container TCP port (container listens here; host maps public port to it)
          labelZh: Relay 容器内 TCP 端口（容器监听；宿主机将公网端口映射到此端口）
          required: true
          rule: paramPort
          type: number
        - default: 443
          edit: true
          envKey: NETBIRD_RELAY_PUBLIC_PORT
          labelEn: Host + rels:// public TCP port (published by Docker in custom_cert mode)
          labelZh: 宿主机与 rels:// 公网 TCP 端口（custom_cert 下由 Docker 直接映射暴露）
          required: true
          rule: paramPort
          type: number
        - default: 3478
          edit: true
          envKey: NETBIRD_STUN_PORT
          labelEn: STUN UDP port (host, not proxied by OpenResty)
          labelZh: STUN UDP 端口（宿主机直连，不经 OpenResty）
          required: true
          rule: paramPort
          type: number
        - default: ""
          edit: true
          envKey: NETBIRD_LETSENCRYPT_EMAIL
          labelEn: Let's Encrypt email (only for letsencrypt_builtin)
          labelZh: Let's Encrypt 邮箱（仅 letsencrypt_builtin 模式）
          required: false
          rule: paramCommon
          type: text
