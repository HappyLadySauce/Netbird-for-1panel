additionalProperties:
    formFields:
        - default: ""
          edit: true
          envKey: NETBIRD_RELAY_DOMAIN
          labelEn: Relay public domain (e.g. relay-cn.example.com, no https://)
          labelZh: Relay 公网域名（如 relay-cn.example.com，不要带 https://）
          required: true
          rule: paramCommon
          type: text
        - default: ""
          edit: true
          envKey: NETBIRD_RELAY_AUTH_SECRET
          labelEn: Relay auth secret (same as main NetBird authSecret; base64 allowed)
          labelZh: Relay 认证密钥（与主 NetBird authSecret 一致，支持 base64 含 /+=）
          required: true
          type: text
        - default: custom_cert
          edit: true
          envKey: NETBIRD_RELAY_TLS_MODE
          labelEn: TLS mode (custom_cert | letsencrypt_builtin)
          labelZh: TLS 模式（custom_cert 自填证书 | letsencrypt_builtin 容器申请）
          required: true
          rule: paramCommon
          type: text
        - default: ""
          edit: true
          envKey: NETBIRD_TLS_CERT_FILE
          labelEn: TLS certificate file on host (required for custom_cert; absolute path)
          labelZh: TLS 证书文件路径（custom_cert 必填，宿主机绝对路径）
          required: false
          type: text
        - default: ""
          edit: true
          envKey: NETBIRD_TLS_KEY_FILE
          labelEn: TLS private key file on host (required for custom_cert; absolute path)
          labelZh: TLS 私钥文件路径（custom_cert 必填，宿主机绝对路径）
          required: false
          type: text
        - default: 443
          edit: true
          envKey: PANEL_APP_PORT_HTTP
          labelEn: Relay TCP port (rels:// URL; use with 「External port access」 in advanced settings)
          labelZh: Relay TCP 端口（rels:// 地址；高级设置中勾选「端口外部访问」以放行防火墙）
          required: true
          rule: paramPort
          type: number
        - default: 3478
          edit: true
          envKey: PANEL_APP_PORT_STUN
          labelEn: STUN UDP port (use with 「External port access」 in advanced settings)
          labelZh: STUN UDP 端口（高级设置中勾选「端口外部访问」以放行防火墙）
          required: true
          rule: paramPort
          type: number
        - default: 80
          edit: true
          envKey: PANEL_APP_PORT_ACME
          labelEn: HTTP port for Let's Encrypt (letsencrypt_builtin only; default 80)
          labelZh: Let's Encrypt HTTP 端口（仅 letsencrypt_builtin；默认 80）
          required: false
          rule: paramPort
          type: number
        - default: ""
          edit: true
          envKey: NETBIRD_LETSENCRYPT_EMAIL
          labelEn: Let's Encrypt email (only for letsencrypt_builtin)
          labelZh: Let's Encrypt 邮箱（仅 letsencrypt_builtin 模式）
          required: false
          rule: paramCommon
          type: text
